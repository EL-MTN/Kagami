name: test

on:
  pull_request:
  push:
    branches: [master]

# Cancel in-progress runs for the same ref when a new push lands.
concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck + lint + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          # Cache npm dependencies between runs.
          cache: "npm"

      - name: Use the npm version pinned by packageManager
        # Node 22 ships with npm 10, but our lockfile is written by npm 11.x
        # (per package.json's `packageManager` field). Corepack reads that
        # field and provisions the matching npm before `npm ci` runs.
        run: |
          corepack enable
          corepack prepare --activate

      - name: Install dependencies
        # `npm ci` is faster than `npm install` and fails if package-lock.json
        # is out of sync with package.json. Disable scripts so a malicious
        # transitive dep can't run during install.
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        # typescript-eslint with `projectService: true` loads the full TS
        # project graph for type-aware rules, which can exceed Node's
        # default ~2 GB heap on the bot project. The runner has 7 GB RAM
        # so 4 GB is comfortable.
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run lint

      - name: Test
        run: npm run test
